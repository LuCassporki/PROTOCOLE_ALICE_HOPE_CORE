<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="style_Hope.css">
    <title>HDO - Hop Core v0.2 (Reactive & Autonomous)</title>
   
</head>
<body>

    <div class="hud-matrix-layer" id="hop-grid-anchor">

        <div class="hop-status-header">
            <div class="sys-title" id="sys-title">HDO AI Protocol // Sync</div>
            <div class="sys-state" id="hop-state-text">SYSTEM // IDLE</div>
        </div>

       <!-- BULLE COMPORTEMENTALE HOP AVEC AVATAR INTÉGRÉ -->
<div class="hop-bubble-container" id="hop-bubble">
    <div class="hop-ring-bracket"></div>
    <div class="hop-core-essence" id="hop-essence">
        
        <!-- INTEGRATION DU VISUEL EN COUCHE DE FUSION -->
        <div class="hop-visual-avatar"></div>

        <!-- Égaliseurs toujours opérationnels par-dessus -->
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
    </div>
</div>

        <div class="hop-terminal-overlay" id="hop-terminal">
            <div class="terminal-header">
                <span>CORE_VERSION // V0.2_BEHAVIOR</span>
                <span id="network-tag" style="color: var(--hdo-cyan);">STABLE</span>
            </div>
            <div class="terminal-output" id="hop-output-text">
                [Hop] : Capsule prête, Alexander. Entre une commande ou laisse-moi travailler en tâche de fond.
            </div>
            <div class="terminal-input-row">
                <input type="text" id="user-input" placeholder="Lancer une interaction..." autocomplete="off">
                <button class="terminal-send-btn" id="send-btn">Send</button>
            </div>
        </div>

        <div class="instruction-tap">Taper le noyau pour déployer Hop</div>

    </div>

    
</body>
<script src="hope.js"></script>
</html>
